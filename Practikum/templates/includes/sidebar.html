{% load static %}
<!-- Оверлей для мобильных -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
	<nav class="sidebar-nav">
		{% if user.is_authenticated %}
		<div class="sidebar-section">
			<ul class="sidebar-menu">
				<a
					class="sidebar-link"
					href="{% url 'prac:profile' username=user.username %}"
				>
					<span class="sidebar-icon">👤</span>
					<span class="sidebar-text">Личный кабинет</span>
				</a>
			</ul>
		</div>
		{% endif %}

		<div class="sidebar-section">
			<ul class="sidebar-menu">
				<a href="{% url 'prac:course' %}" class="sidebar-link">
					<span class="sidebar-icon">📚</span>
					<span class="sidebar-text">Курсы</span>
				</a>
			</ul>
		</div>

		{% if user.is_authenticated %}
		<div class="sidebar-section">
			<ul class="sidebar-menu">
				<a href="{% url 'prac:task' %}" class="sidebar-link">
					<span class="sidebar-icon">✓</span>
					<span class="sidebar-text">Задачи</span>
				</a>
			</ul>
		</div>

		<div class="sidebar-section">
			<ul class="sidebar-menu">
				<a href="{% url 'prac:settings' %}" class="sidebar-link">
					<span class="sidebar-icon">⚙️</span>
					<span class="sidebar-text">Настройки</span>
				</a>
			</ul>
		</div>
		{% endif %}
	</nav>
</aside>

<script src='{% static "js/sidebar.js" %}'></script>
