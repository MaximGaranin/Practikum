{% extends "base.html" %}
{% load static %}
{% block title %}
    Выбор курса
{% endblock %}
{% block link %}
<link rel="stylesheet" href="{% static 'css/curs.css' %}">
{% endblock %}
{% block content %}
    <div class="container">
        <div class="header">
            <h1>Выбор курса</h1>
            <a href="#" class="recent-link">Последние решенные</a>
        </div>

        <div class="filters">
            <select class="filter-select" id="language-filter">
                <option value="">Язык</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="java">Java</option>
                <option value="csharp">C#</option>
                <option value="cpp">C++</option>
            </select>

            <select class="filter-select" id="group-filter">
                <option value="">Группа</option>
                <option value="beginner">Начинающий</option>
                <option value="intermediate">Средний</option>
                <option value="advanced">Продвинутый</option>
            </select>
        </div>

        <div class="courses-grid" id="courses-grid">
            <!-- Courses will be generated by JavaScript -->
        </div>
    </div>

    <script>
        const coursesData = [
            { id: 1, name: 'Курс', language: 'python', group: 'beginner' },
            { id: 2, name: 'Курс', language: 'javascript', group: 'intermediate' },
            { id: 3, name: 'Курс', language: 'python', group: 'advanced' },
            { id: 4, name: 'Курс', language: 'java', group: 'beginner' },
            { id: 5, name: 'Курс', language: 'csharp', group: 'intermediate' },
            { id: 6, name: 'Курс', language: 'cpp', group: 'beginner' },
            { id: 7, name: 'Курс', language: 'python', group: 'intermediate' },
            { id: 8, name: 'Курс', language: 'javascript', group: 'advanced' },
            { id: 9, name: 'Курс', language: 'java', group: 'intermediate' },
            { id: 10, name: 'Курс', language: 'csharp', group: 'advanced' },
            { id: 11, name: 'Курс', language: 'cpp', group: 'intermediate' },
            { id: 12, name: 'Курс', language: 'python', group: 'beginner' },
            { id: 13, name: 'Курс', language: 'javascript', group: 'beginner' },
            { id: 14, name: 'Курс', language: 'java', group: 'advanced' },
            { id: 15, name: 'Курс', language: 'csharp', group: 'beginner' },
            { id: 16, name: 'Курс', language: 'cpp', group: 'advanced' },
            { id: 17, name: 'Курс', language: 'python', group: 'intermediate' },
            { id: 18, name: 'Курс', language: 'javascript', group: 'intermediate' },
            { id: 19, name: 'Курс', language: 'java', group: 'beginner' },
            { id: 20, name: 'Курс', language: 'csharp', group: 'intermediate' },
            { id: 21, name: 'Курс', language: 'cpp', group: 'beginner' },
            { id: 22, name: 'Курс', language: 'python', group: 'advanced' },
            { id: 23, name: 'Курс', language: 'javascript', group: 'beginner' },
            { id: 24, name: 'Курс', language: 'java', group: 'intermediate' },
            { id: 25, name: 'Курс', language: 'csharp', group: 'advanced' },
            { id: 26, name: 'Курс', language: 'cpp', group: 'intermediate' },
            { id: 27, name: 'Курс', language: 'python', group: 'beginner' },
            { id: 28, name: 'Курс', language: 'javascript', group: 'advanced' },
            { id: 29, name: 'Курс', language: 'java', group: 'beginner' },
            { id: 30, name: 'Курс', language: 'csharp', group: 'intermediate' }
        ];

        let selectedCourse = null;

        function renderCourses(courses) {
            const grid = document.getElementById('courses-grid');
            grid.innerHTML = '';

            courses.forEach(course => {
                const card = document.createElement('label');
                card.className = 'course-card';
                
                card.innerHTML = `
                    <input type="radio" name="course" value="${course.id}" ${selectedCourse === course.id ? 'checked' : ''}>
                    <div class="course-content">
                        <div class="radio-custom"></div>
                        <span class="course-name">${course.name}</span>
                    </div>
                `;
                
                card.addEventListener('click', () => {
                    selectedCourse = course.id;
                    console.log('Selected course:', course.id);
                });
                
                grid.appendChild(card);
            });
        }

        function filterCourses() {
            const languageFilter = document.getElementById('language-filter').value;
            const groupFilter = document.getElementById('group-filter').value;

            let filtered = coursesData;

            if (languageFilter) {
                filtered = filtered.filter(course => course.language === languageFilter);
            }

            if (groupFilter) {
                filtered = filtered.filter(course => course.group === groupFilter);
            }

            renderCourses(filtered);
        }

        document.getElementById('language-filter').addEventListener('change', filterCourses);
        document.getElementById('group-filter').addEventListener('change', filterCourses);

        // Initial render
        renderCourses(coursesData);
    </script>
{% endblock %}
